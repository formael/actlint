#
# Publishes via npm Trusted Publishing (OIDC) with automatic provenance; verify installs with
# `npm audit signatures`. GitHub Releases carry no binary assets — the npm tarball is the
# artifact of record. Version bumps land through a reviewed `pnpm changeset version` PR;
# merging it to main triggers the publish. See RELEASING.md.

name: Release

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-ready:
    name: release-ready
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check for unconsumed changesets
        id: check
        # Unconsumed changesets mean main is between releases; publishing waits for the reviewed
        # `pnpm changeset version` PR that consumes them. Without this gate, changesets/action
        # falls into version mode and fails: this org does not allow Actions to create PRs.
        run: |
          pending=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l)
          if [ "$pending" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "$pending unconsumed changeset(s) on main — skipping publish until versioned"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: publish
    needs: release-ready
    if: needs.release-ready.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # tags + GitHub Releases
      id-token: write # npm Trusted Publishing + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Changesets needs full history

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        # Trusted Publishing requires npm >= 11.5.1; Node 22 bundles npm 10.
        run: npm install --global npm@11.5.1

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish (Changesets → npm via OIDC)
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
