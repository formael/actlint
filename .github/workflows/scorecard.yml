#
# OpenSSF Scorecard — a security tool is judged first on whether it is itself secure. The results are
# published (public, and to the code-scanning dashboard) so the score is a launch asset, not a private
# metric. A Scorecard regression is treated as a bug. Actions are pinned by full commit SHA.

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly, Monday 07:00 UTC.
    - cron: "0 7 * * 1"
  push:
    branches: [main]

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result to code scanning
      id-token: write # publish results to the public OpenSSF API
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish the score so the badge and the public report resolve.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@181d5eefc20863364f96762470ba6f862bdef56b # v3.29.2
        with:
          sarif_file: results.sarif
