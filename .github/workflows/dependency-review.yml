#
# Dependency review on every PR. Every transitive dependency is attack surface a security tool asks
# others to accept, so a PR that adds one is reviewed for known vulnerabilities and license fit before
# it lands. Backed by an audit of the resolved production tree. Actions are pinned by full commit SHA.

name: Dependency review

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
          # Apache-2.0 project: reject copyleft and unclear licenses in the dependency tree.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-3.0

  audit:
    name: Audit production tree
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Set up Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit (production dependencies, high and up)
        run: pnpm audit --prod --audit-level high
