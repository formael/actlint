#
# Dependency review on every PR. Every transitive dependency is attack surface a security tool asks
# others to accept, so a PR that adds one is reviewed for known vulnerabilities and license fit before
# it lands. Backed by an audit of the resolved production tree. Actions are pinned by full commit SHA.

name: Dependency review

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # Apache-2.0 project: reject copyleft and unclear licenses in the dependency tree.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-3.0

  audit:
    name: Audit production tree
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit (production dependencies, high and up)
        run: pnpm audit --prod --audit-level high
