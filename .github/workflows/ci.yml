#
# The PR gate: build, typecheck, lint, test, guards, eval. Release and Scorecard live in
# release.yml and scorecard.yml.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Determinism is asserted across the LTS floor and the current line.
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type-check
        run: pnpm typecheck

      - name: Lint (Biome, zero-warning)
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Static guards (purity · SDK boundary · determinism)
        run: pnpm guards

      - name: Eval (FP-weighted precision/recall — blocks precision regressions)
        run: pnpm eval
