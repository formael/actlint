#
# The PR gate. This is the pull-request contract only; the full release / provenance posture
# (OIDC publishing, SBOM, SLSA, cosign, OpenSSF Scorecard) is deferred. Actions are pinned by
# full commit SHA; bumps are automated later via Renovate/Dependabot.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege by default: no token scopes at the workflow level; each job grants only what it needs.
permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Determinism is asserted across the LTS floor and the current line.
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type-check
        run: pnpm typecheck

      - name: Lint (Biome, zero-warning)
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Static guards (purity · SDK boundary · determinism)
        run: pnpm guards

      - name: Eval (FP-weighted precision/recall — blocks precision regressions)
        run: pnpm eval
